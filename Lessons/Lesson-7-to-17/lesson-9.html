<!DOCTYPE html>
  <html>
    <head>
      <title>
        Youtube Clone
      </title>
      <style>
        p {
          font-family: Arial;
        }

         .search-bar {
          display: block;
          font-size: 14px;
          margin-left: 12px;

        }

        .thumbnail {
          width: 300px;
          object-fit: cover;
        }

        .video-title {
          font-weight: bold;
          width: 220px;
          font-size: 14px;
        }

        .video-author {
          font-size: 12px;
          margin-bottom: 0;
        }

        .video-stats {
          font-size: 12px;
          margin-top: 4px;
        }

        .video-preview {
          width: 300px;
          display: inline-block;
          vertical-align: top;
          margin-right: 12px;
        }
      </style>
    </head>
    <body>
      <input class="search-bar" type="text" placeholder="Search">
      <div class="video-preview">
        <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
        <p class="video-title">Why Jackson Storm Is So Fast?</p>
        <p class="video-author">The Film Theorists</p>
        <p class="video-stats">5.8 Million views &middot; 6 months ago</p>
      </div>

      <div class="video-preview">
        <img class="thumbnail" src="thumbnails/thumbnail-2.webp">
        <p class="video-title">I built 10 apps with completly different langauges</p>
        <p class="video-author">Fireship</p>
        <p class="video-stats">2.1 Million views &middot; 1 months ago</p>
      </div>
    </body>
  </html>
