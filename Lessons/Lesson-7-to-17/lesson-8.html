<!DOCTYPE html>
  <html>
    <head>
      <title>
        Youtube Clone
      </title>
      <style>
        p {
          font-family: Arial;
        }

         .search-bar {
          font-size: 14px;
          margin-left: 12px;
        }

        .thumbnail {
          display: block;
          width: 250px;
          object-fit: cover;
        }

        .video-title {
          font-weight: bold;
          width: 220px;
          font-size: 14px;
        }

        .video-author {
          font-size: 12px;
          margin-bottom: 0;
        }

        .video-stats {
          font-size: 12px;
          margin-top: 4px;
        }
      </style>
    </head>
    <body>
      <input class="search-bar" type="text" placeholder="Search">
      <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
      <p class="video-title">Why Jackson Storm Is So Fast?</p>
      <p class="video-author">The Film Theorists</p>
      <p class="video-stats">5.8 Million views &middot; 6 months ago</p>
    </body>
  </html>
