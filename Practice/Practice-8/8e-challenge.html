<!DOCTYPE html>
  <html>
    <head>
      <title>
        Practice 8e
      </title>
      <style>
        p {
          font-family: Arial;
          font-size: 30px;
          margin-bottom: 18px;
        }

        input {
          display: block;
          background-color: rgb(227, 227, 227);
          color: rgb(133, 132, 133);
          font-size: 12px;
          padding: 12px;
          border: none;
          margin-bottom: 5px;
          width: 270px;
        }

        .request-button {
          background-color: rgb(0,0,0);
          color: rgb(255,255,255);
          margin-top: 20px;
          border: none;
          padding: 14px;
          font-size: 12px;
          margin-right: 14px;
        }

        .schedule-button {
          background-color: rgb(227, 227, 227);
          color:  rgb(0,0,0);
          margin-top: 20px;
          border: none;
          padding: 14px;
          font-size: 12px;
        }
      </style>
    </head>
    <body>
      <p>Request a ride now</p>
      <input type="text" placeholder="Enter pickup location">
      <input type="text" placeholder="Enter destination">
      <button class="request-button">
        Request now
      </button>
      <button class="schedule-button">
        Schedule for later
      </button>
    </body>
  </html>
