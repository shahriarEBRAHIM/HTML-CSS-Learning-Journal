<!DOCTYPE html>
  <html>
    <head>
      <title>
        Practice 7g
      </title>
      <style>
        p {
          font-family: Arial;
        }

        .avatar {
          height: 30px;
          width: 30px;
          border-radius: 15px;
          vertical-align: middle;
        }

        .status {
          color: rgb(124, 124, 124);
          margin-left: 6px;
          font-size: 12px;
        }

        .tweet {
          background-color: rgb(75, 153, 255);
          color: rgb(255,255,255);
          padding-top: 8px;
          padding-bottom: 8px;
          padding-left: 12px;
          padding-right: 12px;
          border: none;
          border-radius: 18px;
          font-weight: bold;
          font-size: 12px;
          cursor: pointer;
          margin-left: 60px;
        }
      </style>
    </head>
    <body>
      <p>
        <img class="avatar" src="assets/Jubayer-photo.jpg">
        <span class="status">What's happening?</span>
        <span class="tweet">Tweet</span>
      </p>
    </body>
  </html>
