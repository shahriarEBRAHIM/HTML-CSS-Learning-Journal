<!DOCTYPE html>
  <html>
    <head>
      <style>
        .title {
          font-size: 24px;
          font-weight: bold;
        }

        .subscribe-button {
          background-color: rgb(200,0,0);
          color: rgb(255,255,255);
          padding-top: 8px;
          padding-bottom: 8px;
          padding-left: 10px;
          padding-right: 10px;
          border: none;
          border-radius: 2px;
          cursor: pointer;
          transition: opacity 0.15s;
          vertical-align: top;
        }

        .subscribe-button:hover {
          opacity: 0.8;
        }

        .subscribe-button:active {
        opacity: 0.5;
        }

        .join-button {
          background-color: rgb(255,255,255);
          border-color: rgb(32, 128, 255);
          border-style: solid;
          border-width: 1px;
          color: rgb(32, 128, 255);
          padding-top: 7px;
          padding-bottom: 7px;
          padding-left: 10px;
          padding-right: 10px;
          border-radius: 2px;
          cursor: pointer;
          margin-left: 8px;
          transition: background-color 0.3s, color 0.3s;
          vertical-align: top;
        }

        .join-button:hover {
          background-color: rgb(32, 128, 255);
          color: rgb(255,255,255);

        }

        .join-button:active {
          opacity: 0.7;
        }
        .tweet-button {
          background-color: rgb(32, 128, 255);
          color: rgb(255,255,255);
          padding-top: 8px;
          padding-bottom: 8px;
          padding-left: 12px;
          padding-right: 12px;
          border: none;
          border-radius: 18px;
          font-weight: bold;
          font-size: 15px;
          cursor: pointer;
          margin-left: 8px;
          transition: box-shadow 0.3s;
          vertical-align: top;
        }

        .tweet-button:hover {
          box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.2);
        }
      </style>
    </head>
    <body>
      <p class="title">
        Lesson 4: Implementing CSS Box Model
      </p>

      <button class="subscribe-button">
        SUBSCRBE
      </button>

      button class="join-button">
        JOIN
      </button>

      <button class="tweet-button">
        Tweet
      </button>
    </body>
  </html>
