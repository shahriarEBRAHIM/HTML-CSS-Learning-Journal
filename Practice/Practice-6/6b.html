<!DOCTYPE html>
  <html>
    <head>
      <title>
        Buttons Practice: Hover, Shadows, Transitions
      </title>
      <style>
        .title {
          font-size: 24px;
          font-weight: bold;
        }

        .subscribe-button {
          background-color: rgb(200,0,0);
          color: rgb(255,255,255);
          height: 36px;
          width: 108px;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          transition: opacity 0.15s;
        }

        .subscribe-button:hover {
          opacity: 0.8;
        }

        .subscribe-button:active {
        opacity: 0.5;
        }

        .join-button {
          background-color: rgb(255,255,255);
          border-color: rgb(32, 128, 255);
          border-style: solid;
          border-width: 1px;
          color: rgb(32, 128, 255);
          height: 36px;
          width: 62px;
          border-radius: 2px;
          cursor: pointer;
          margin-left: 8px;
          transition: background-color 0.3s,
                      color 0.3s;
        }

        .join-button:hover {
          background-color: rgb(32, 128, 255);
          color: rgb(255,255,255);

        }

        .join-button:active {
          opacity: 0.7;
        }
        .tweet-button {
            background-color: rgb(32, 128, 255);
            color: rgb(255,255,255);
            height: 36px;
            width: 74px;
            border: none;
            border-radius: 18px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-left: 8px;
            transition: box-shadow 0.3s;
        }

        .tweet-button:hover {
          box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.2);
        }
      </style>
    </head>
    <body>
      <p class="title">Lesson 3: Hovers, Transitions, Shadows</p>
      <button class="subscribe-button">SUBSCRBE</button>
      <button class="join-button">JOIN</button>
      <button class="tweet-button">Tweet</button>
    </body>
  </html>
