<!DOCTYPE html>
  <html>
    <head>
      <title>
        Practice 9g
      </title>
      <style>
        p {
          font-family: Arial;
          margin-top: 0;
          margin-bottom: 0;
        }

        .container {
          display: inline-block;
          vertical-align: top;
          width: 200px;
          box-shadow: 0 1px 4px rgba(0,0,0,0.25);
          margin-right: 12px;

        }

        .avatar {
          object-fit: cover;
          height: 200px;
          width: 200px;
          margin-bottom: 12px;
        }

        .name {
          margin-left: 8px;
          font-size: 16px;
          font-weight: bold;
          margin-bottom: 4px;
        }

        .stats {
          margin-left: 8px;
          margin-bottom: 12px;
          color: rgb(100, 100, 100);
        }

        .add-friend {
          background-color: rgb(24, 119, 242);
          color: white;
          padding-left: 16px;
          padding-right: 16px;
          padding-top: 10px;
          padding-bottom: 10px;
          margin-left: 8px;
          margin-bottom: 12px;
          border: none;
          border-radius: 4px
        }
      </style>
    </head>
    <body>
      <div class="container">
        <img class="avatar" src="assets/Ebrahim-photo.jpg">
        <p class="name">Shahriar Ebrhaim</p>
        <p class="stats">6 mutual friends</p>
        <button class="add-friend">
          Add Friend
        </button>
      </div>

      <div class="container">
        <img class="avatar" src="assets/Jubayer-photo.jpg">
        <p class="name">Jubayer Ibn Anwar</p>
        <p class="stats">4 mutual friends</p>
        <button class="add-friend">
          Add Friend
        </button>
      </div>

      <div class="container">
        <img class="avatar" src="assets/Rakib-photo.jpg">
        <p class="name">Md Rakibul</p>
        <p class="stats">2 mutual friends</p>
        <button class="add-friend">
          Add Friend
        </button>
      </div>
    </body>
  </html>
