<!DOCTYPE html>
  <html>
    <head>
      <title>
        Practice 9e
      </title>
      <style>
        span {
          font-family: Arial;
        }

        .container {
          display: inline-block;
          background-color: rgb(252, 252, 252);
          border: none;
          border-radius: 6px;
          padding: 8px;
          box-shadow: 0px 1px 4px rgba(0,0,0,0.2);
        }

        .avatar {
          height: 30px;
          width: 30px;
          border-radius: 15px;
          vertical-align: middle;
        }

        .status {
          color: rgb(124, 124, 124);
          margin-left: 6px;
          font-size: 12px;
        }

        .tweet {
          background-color: rgb(75, 153, 255);
          color: rgb(255,255,255);
          padding-top: 8px;
          padding-bottom: 8px;
          padding-left: 12px;
          padding-right: 12px;
          border: none;
          border-radius: 18px;
          font-weight: bold;
          font-size: 12px;
          cursor: pointer;
          margin-left: 60px;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <img class="avatar" src="assets/Ebrahim-photo.jpg">
        <span class="status">What's happening?</span>
        <span class="tweet">Tweet</span>
      </div>
    </body>
  </html>
