<!DOCTYPE html>
  <html>
    <head>
      <title>
        Practice 9h
      </title>
      <style>
        div {
          text-align: center;
          margin-top: 0;
          margin-bottom: 0;
          font-family: Arial;
        }
          
        button {
          background-color: rgb(241, 241, 241);
          color: rgb(0,0,0);
          padding-top: 12px;
          padding-bottom: 12px;
          padding-left: 20px;
          padding-right: 20px;
          margin-top: 32px;
          margin-right: 12px;
          border: none;
          cursor: pointer;
        }
        
        .google-logo {
          width: 200px;
          height: 80px;
          object-fit: cover;
        }

        .search-bar {
          width: 500px;
          padding: 12px;
          border: none;
          border-radius: 30px;
          box-shadow: 0px 1px 4px rgba(0,0,0,0.25);
          margin-top: 0;
        }
      </style>
    </head>
    <body>
      <div>
        <img class="google-logo" src="assets/Google-Logo.jpg">
      </div>
      <div>
        <input class="search-bar" type="text" placeholder="Search Google or type a URL">
      </div>
      <div>
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
      </div>
      </body>
  </html>
